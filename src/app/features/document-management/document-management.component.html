<div class="documents-container">
  <div class="header">
    <h2>Gestión de Documentos</h2>
  </div>

  <div *ngIf="isLoading()" class="loading">
    Cargando documentos...
  </div>

  <table *ngIf="!isLoading() && documents().length > 0" class="doc-table">
    <thead>
      <tr>
        <th>Documento</th>
        <th>Área</th>
        <th>Indexado el</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let doc of documents()">
        <td>
          <div class="doc-name">
            <div class="doc-info">
              <span class="file-name" [title]="doc.name">{{ getFileName(doc.name) }}</span>
              <span class="folder-path" *ngIf="getFolderPath(doc.name)" [title]="doc.name">{{ getFolderPath(doc.name) }}</span>
            </div>
          </div>
        </td>
        <td>{{ doc.area | uppercase }}</td>
        <td>{{ doc.indexedAt | date:'medium' }}</td>
        <td>
          <div class="actions">
            <input type="file" #fileInput style="display: none;" accept=".pdf,.docx,.md,.txt,.xlsx,.csv,.sql" (change)="onFileSelected($event, doc)">
            <button class="icon-btn update-btn" 
                    [disabled]="isUpdating() === doc.id" 
                    (click)="fileInput.click()" 
                    title="Actualizar">
              <app-icon name="upload"></app-icon>
            </button>
            <button class="icon-btn reject-btn" 
                    [disabled]="isUpdating() === doc.id" 
                    (click)="deleteDocument(doc.id)" 
                    title="Eliminar">
              <app-icon name="trash"></app-icon>
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!isLoading() && documents().length === 0" class="empty-state">
    No se encontraron documentos en esta área.
  </div>

  <app-confirm-modal
    *ngIf="showModal()"
    [title]="modalTitle()"
    [message]="modalMessage()"
    [confirmVariant]="modalVariant()"
    (confirm)="executePendingAction()"
    (cancel)="closeModal()">
  </app-confirm-modal>
</div>
